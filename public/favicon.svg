<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" role="img" aria-label="Reyad Hasnain">
  <defs>
    <!-- Brand orange gradient — slight diagonal from a lighter top-left to the
         flat brand orange. Gives the tile depth at 16×16 and at 512×512. -->
    <linearGradient id="bg" x1="0" y1="0" x2="64" y2="64" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#ff8a3d"/>
      <stop offset="0.55" stop-color="#ff6600"/>
      <stop offset="1" stop-color="#e85800"/>
    </linearGradient>
    <!-- Subtle inner shadow on the rim, for depth at large sizes -->
    <linearGradient id="rim" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#ffffff" stop-opacity="0.20"/>
      <stop offset="1" stop-color="#000000" stop-opacity="0.15"/>
    </linearGradient>
  </defs>

  <!-- Orange tile -->
  <rect width="64" height="64" rx="14" fill="url(#bg)"/>
  <rect width="64" height="64" rx="14" fill="url(#rim)"/>

  <!-- "RH" monogram, white, semi-bold -->
  <text
    x="50%"
    y="55%"
    text-anchor="middle"
    dominant-baseline="middle"
    font-family="Inter, ui-sans-serif, system-ui, -apple-system, 'Segoe UI', sans-serif"
    font-weight="800"
    font-size="30"
    fill="#ffffff"
    letter-spacing="-1.5"
  >RH</text>
</svg>
